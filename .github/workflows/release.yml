name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''
          # Pinned to 22.04 for a lower glibc baseline so the AppImage /
          # .deb runs on a wider range of distros.
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file \
            wget

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version to $VERSION"
          # Update package.json
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          # Update tauri.conf.json
          node -e "const p=require('./src-tauri/tauri.conf.json'); p.version='$VERSION'; require('fs').writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2)+'\n')"
          # Update Cargo.toml
          sed -i.bak 's/^version = ".*"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign macOS builds. Without this, unsigned arm64 binaries
          # are killed by the kernel on Apple Silicon ("damaged and can't be
          # opened"). Ad-hoc signing is free (no Apple Developer account
          # required) and the user still has to strip the quarantine flag
          # the first time, but the app at least launches.
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Freedy ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform below.

            **macOS:**
            - Apple Silicon (M1/M2/M3/M4): `Freedy_*_aarch64.dmg`
            - Intel: `Freedy_*_x64.dmg`

            On first launch macOS will say the app is damaged because it isn't notarized. Run this once to dismiss the warning:

            ```bash
            xattr -dr com.apple.quarantine /Applications/Freedy.app
            ```

            **Windows:** `Freedy_*_x64-setup.exe` or `Freedy_*_x64_en-US.msi`.

            **Linux:** `Freedy_*_amd64.AppImage` (portable), `Freedy_*_amd64.deb` (Debian/Ubuntu), or `Freedy-*-1.x86_64.rpm` (Fedora/RHEL). The AppImage needs `chmod +x` before running.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
